version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"                # Host 8000 → Container 8000
    volumes:
      - ./instance/database.db:/app/instance/database.db
      - ./logs:/app/logs
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
    restart: unless-stopped
